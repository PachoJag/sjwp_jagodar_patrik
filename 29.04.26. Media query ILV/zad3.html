<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100%;
            height: 100vh;
        }
        .container > div {
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 2rem;
                color: black;
                margin: 5px;
                background-color: blanchedalmond;
            }
        @media(max-width: 767px){
            .container {
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: repeat(12, 1fr);
                gap: 5px;
            }
        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(6, 1fr);
                gap: 5px;
            }
        }
        @media (min-width: 1024px){
            .container{
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(4, 1fr);
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>Slika 1</div>
        <div>Slika 2</div>
        <div>Slika 3</div>
        <div>Slika 4</div>
        <div>Slika 5</div>
        <div>Slika 6</div>
        <div>Slika 7</div>
        <div>Slika 8</div>
        <div>Slika 9</div>
        <div>Slika 10</div>
        <div>Slika 11</div>
        <div>Slika 12</div>
    </div>
</body>
</html>
