<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            background-color: antiquewhite;
            width: 80vw;
            height: 80vh;
            margin-left: 10vw;
            margin-top: 10vh;
        }
        .odd {
            background-color: gray;
            border-radius: 5%;
            color: white;
            text-align: center;
            padding-top: 50%;
        }
        .even {
            background-color: lightgray;
            border-radius: 5%;
            color: black;
            text-align: center;
            padding-top: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="odd">1</div>
        <div class="even">2</div>
        <div class="odd">3</div>
        <div class="even">4</div>
        <div class="odd">5</div>
        <div class="even">6</div>
        <div class="odd">7</div>
        <div class="even">8</div>
        <div class="odd">9</div>
        <div class="even">10</div>
        <div class="odd">11</div>
        <div class="even">12</div>
    </div>
</body>
</html>
