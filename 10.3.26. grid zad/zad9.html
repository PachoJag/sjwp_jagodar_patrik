<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-color: gray;
            border-radius: 10%;
            text-align: start;
            padding-top: 50px;
            font-size: 30px;
            color: white;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            background-color: antiquewhite;
            width: 100vw;
            height: 100vh;
            border-radius: 0%;
        }
        
        .i1 {
            grid-area: 1 / 1 / 2 / 3;
        }
            
        .i2 {
            grid-area: 1 / 3 / 2 / 6;
        }
        .i3 {
            grid-area: 2 / 1 / 3 / 2;
        }
        .i4 {
            grid-area: 2 / 2 / 3 / 5;
        }
        .i5 {
            grid-area: 3 / 1 / 4 / 6;
        }
        .i6 {
            grid-area: 2 / 3 / 3 / 6;
            background-color: blue;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="i1">A</div>
        <div class="i2">B</div>
        <div class="i3">C</div>
        <div class="i4">D</div>
        <div class="i5">E</div>
        <div class="i6">F</div>
    </div>
</body>
</html>
