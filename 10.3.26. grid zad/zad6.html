<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 100px 100px 10px;
            gap: 10px;
            background-color: antiquewhite;
            width: 100vw;
            height: 100vh;
        }
        div {
            background-color: gray;
            text-align: center;
            border-radius: 5%;
            padding: 20px;
            font-size: 30px;
        }
        .i1 {
            grid-row: 1/2;
            grid-column: span 2;
        }
        .i2 {
            grid-row: span 2;
            grid-column: 3/4;
        }
        .i3 {
            grid-row: 2/3;
            grid-column: 1/2;
        }
        .i4 {
            grid-row: 2/3;
            grid-column: 2/3;
        }
        .i5 {
            grid-row: 1/4;
            grid-column: 4/5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="i1">A</div>
        <div class="i2">B</div>
        <div class="i3">C</div>
        <div class="i4">D</div>
        <div class="i5">E</div>
    </div>
</body>
</html>
